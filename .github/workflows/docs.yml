name: docs

on:
  # trigger deployment on every push to main branch
  push:
    branches: [master]
  # trigger deployment manually
  workflow_dispatch:

permissions:
  contents: write  # deploys to gh-pages

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch all commits to get last updated time or other git log info
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # choose node.js version to use
          node-version: 16

      - name: Install deps
        working-directory: ./docs
        run: npm install

      - name: Copy changelog
        run: cp CHANGELOG.md docs/changelog.md

      - name: Copy assets
        run: |
          mkdir -p docs/.vuepress/public
          cp art/logo_mixed.gif docs/.vuepress/public/logo.gif
          cp art/heart.svg docs/.vuepress/public/heart.svg
          cp art/heart.png docs/.vuepress/public/heart.png
        
      # run build script
      - name: Build VuePress site
        working-directory: ./docs
        run: npx vuepress build

      # please check out the docs of the workflow for more details
      # @see https://github.com/crazy-max/ghaction-github-pages
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v5.0.0
        with:
          # deploy to gh-pages branch
          target_branch: gh-pages
          # deploy the default output dir of VuePress
          build_dir: docs/.vuepress/dist
        env:
          # @see https://docs.github.com/en/actions/reference/authentication-in-a-workflow#about-the-github_token-secret
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
